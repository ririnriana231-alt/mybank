<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maybank Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#dfe5eb;
}

.container{
    position:relative;
    width:100%;
    max-width:430px;
    height:100vh;
    margin:auto;
    background:linear-gradient(#bfcddb,#eef2f5);
    overflow:hidden;
}

/* Header */
.close{
    position:absolute;
    top:48px;
    left:22px;
    font-size:44px;
    color:#555;
    font-weight:300;
    cursor:pointer;
}

.help{
    position:absolute;
    top:52px;
    right:20px;
    width:34px;
    opacity:.75;
}

.logo{
    text-align:center;
    padding-top:45px;
}

.logo img{
    width:210px;
}

/* Avatar */

.profile{
    margin-top:260px;
    text-align:center;
}

.avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    border:4px solid #f2b700;
    object-fit:cover;
    box-shadow:0 8px 18px rgba(0,0,0,.35);
}

.userid{
    margin-top:12px;
    color:#444;
    font-size:22px;
    letter-spacing:1px;
}

/* Password */

.form{
    margin:65px 35px;
}

.password{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    text-align:center;
    font-size:28px;
    color:#666;
    padding-bottom:10px;
}

.password::placeholder{
    color:#777;
}

.line{
    height:1px;
    background:#999;
}

/* Bottom */

.bottom{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
}

.login{
    width:100%;
    height:92px;
    border:none;
    font-size:28px;
    font-weight:700;
    color:#2d2d2d;
    cursor:pointer;
    background:linear-gradient(to right,#e5a100,#ffd95d);
}

.home{
    width:130px;
    height:6px;
    background:#111;
    border-radius:20px;
    margin:12px auto;
}
</style>

</head>
<body>

<div class="container">

<div class="close">×</div>

<img class="help" src="https://cdn-icons-png.flaticon.com/512/747/747376.png">

<div class="logo">
<img src="Bank-Maybank.jpg">
</div>

<div class="profile">
<img class="avatar" src="avatar.jpg">
<div class="userid">LU*****77</div>
</div>

<div class="form">
<input class="password" type="password" placeholder="Masukkan Password Anda">
<div class="line"></div>
</div>

<div class="bottom">
<button class="login">LOGIN</button>
<div class="home"></div>
</div>

</div>

</body>
</html>
